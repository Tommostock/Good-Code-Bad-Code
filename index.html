<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Code Bad Code</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1 class="title">Good Code <span class="title-accent">Bad Code</span></h1>
        <p class="subtitle">Can you spot the secure code?</p>
    </header>

    <!-- Game Area -->
    <main class="game-container" id="gameContainer">
        <!-- Score & Progress -->
        <div class="status-bar">
            <div class="score" id="scoreDisplay">Score: 0 / 0</div>
            <div class="progress-wrapper">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="question-count" id="questionCount">Question 1 of 10</div>
        </div>

        <!-- Scenario Label -->
        <div class="scenario" id="scenario"></div>

        <!-- Code Cards -->
        <div class="cards-wrapper">
            <div class="card" id="cardLeft" tabindex="0" role="button" aria-label="Select left code snippet">
                <div class="card-label">Option A</div>
                <pre class="code-block"><code id="codeLeft"></code></pre>
            </div>
            <div class="card" id="cardRight" tabindex="0" role="button" aria-label="Select right code snippet">
                <div class="card-label">Option B</div>
                <pre class="code-block"><code id="codeRight"></code></pre>
            </div>
        </div>

        <!-- Feedback -->
        <div class="feedback hidden" id="feedback">
            <div class="feedback-icon" id="feedbackIcon"></div>
            <div class="feedback-text" id="feedbackText"></div>
            <div class="explanation" id="explanation"></div>
            <button class="btn btn-next" id="nextBtn">Next Question</button>
        </div>
    </main>

    <!-- End Screen -->
    <div class="end-screen hidden" id="endScreen">
        <div class="end-card">
            <h2 class="end-title" id="endTitle"></h2>
            <div class="end-score" id="endScore"></div>
            <div class="end-message" id="endMessage"></div>
            <button class="btn btn-restart" id="restartBtn">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
